<div id="modal-preview-routine" class="modal-overlay">
  <div class="modal-content card" style="max-width: 500px">
    <div class="modal-header">
      <h2 id="preview-routine-title">流程預覽</h2>
      <button id="btn-close-preview" class="icon-btn" aria-label="關閉視窗">
        <svg
          viewBox="0 0 24 24"
          width="20"
          height="20"
          stroke="currentColor"
          stroke-width="2"
          fill="none"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="modal-body" style="text-align: left; max-height: 60vh; overflow-y: auto">
      <div
        id="preview-routine-meta"
        style="
          margin-bottom: 1rem;
          border-bottom: 1px solid var(--border-color);
          padding-bottom: 1rem;
        "
      >
        <!-- Metadata will be injected here -->
      </div>
      <div id="preview-routine-steps" class="preview-steps-list">
        <!-- Steps will be dynamically injected here -->
      </div>
    </div>
    <div class="modal-footer" style="justify-content: center">
      <div id="preview-routine-actions-left" style="display: flex; gap: 0.5rem">
        <!-- Actions (Share, Edit, Delete) will be injected here -->
      </div>
      <button id="btn-start-preview" class="btn btn-primary">
        <svg
          viewBox="0 0 24 24"
          width="18"
          height="18"
          stroke="currentColor"
          stroke-width="2"
          fill="currentColor"
        >
          <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
        開始運動
      </button>
    </div>
  </div>
</div>
