<div id="settings-drawer" class="settings-drawer">
  <div class="drawer-overlay" id="settings-overlay"></div>
  <div class="drawer-content">
    <div class="drawer-header">
      <h3>語音與音效設定</h3>
      <button id="btn-close-settings" class="icon-btn" aria-label="關閉設定">
        <svg
          viewBox="0 0 24 24"
          width="24"
          height="24"
          stroke="currentColor"
          stroke-width="2"
          fill="none"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="drawer-body">
      <div class="setting-item">
        <label>雲端同步 (Google 登入)</label>
        <div
          id="auth-status-container"
          class="flex-row"
          style="margin-top: 0.5rem; justify-content: space-between; align-items: center"
        >
          <span id="auth-status-text" class="help-text" style="margin: 0">尚未登入</span>
          <button
            id="btn-google-login"
            class="btn btn-secondary"
            style="padding: 0.25rem 0.75rem; font-size: 0.9rem"
          >
            登入
          </button>
          <button
            id="btn-google-logout"
            class="btn btn-secondary"
            style="display: none; padding: 0.25rem 0.75rem; font-size: 0.9rem"
          >
            登出
          </button>
        </div>
      </div>

      <div class="setting-item">
        <label for="tts-voice">語音選擇</label>
        <select id="tts-voice" class="input-select">
          <option value="">載入中...</option>
        </select>
        <span class="help-text">可用語音選項取決於您的瀏覽器與作業系統環境。</span>
      </div>

      <div class="setting-item">
        <div class="slider-header">
          <label for="tts-rate">語音速度</label>
          <span id="tts-rate-val">1.0x</span>
        </div>
        <input
          type="range"
          id="tts-rate"
          min="0.5"
          max="2.0"
          step="0.1"
          value="1.0"
          class="input-range"
        />
      </div>

      <div class="setting-item">
        <div class="slider-header">
          <label for="tts-volume">語音音量</label>
          <span id="tts-volume-val">100%</span>
        </div>
        <input
          type="range"
          id="tts-volume"
          min="0"
          max="1"
          step="0.1"
          value="1"
          class="input-range"
        />
      </div>

      <div class="setting-item flex-row">
        <label for="sfx-toggle">輔助提示鈴聲 (Chimes)</label>
        <label class="toggle-switch">
          <input type="checkbox" id="sfx-toggle" checked />
          <span class="slider-toggle"></span>
        </label>
      </div>

      <button id="btn-test-voice" class="btn btn-secondary">
        <svg
          viewBox="0 0 24 24"
          width="18"
          height="18"
          stroke="currentColor"
          stroke-width="2"
          fill="none"
        >
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
        測試語音引導
      </button>

      <div
        class="setting-item"
        style="margin-top: 1.5rem; text-align: center; border: none; background: transparent"
      >
        <span style="font-size: 0.75rem; color: var(--text-light)">
          版本更新時間：<span id="app-build-time">讀取中...</span>
        </span>
      </div>
    </div>
  </div>
</div>
