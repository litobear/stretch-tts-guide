<div id="modal-import-routine" class="modal-overlay">
  <div class="modal-content card">
    <div class="modal-header">
      <h3>匯入伸展流程</h3>
      <button id="btn-close-import-modal" class="icon-btn" aria-label="關閉視窗">
        <svg
          viewBox="0 0 24 24"
          width="24"
          height="24"
          stroke="currentColor"
          stroke-width="2"
          fill="none"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <p>貼上分享連結或是匯出碼 (JSON) 來匯入流程。</p>
      <div class="form-group">
        <label for="import-text">分享連結或代碼</label>
        <textarea
          id="import-text"
          required
          placeholder="請在此貼上連結或 JSON 代碼..."
          class="input-textarea-field"
          rows="6"
        ></textarea>
      </div>
      <div id="import-error" class="error-msg" style="display: none">
        無效的流程格式，請再試一次。
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" id="btn-cancel-import" class="btn btn-secondary">取消</button>
      <button type="button" id="btn-submit-import" class="btn btn-primary">開始匯入</button>
    </div>
  </div>
</div>
