<div id="modal-create-routine" class="modal-overlay">
  <div class="modal-content card">
    <div class="modal-header">
      <h3 id="modal-create-title">建立自訂伸展流程</h3>
      <button id="btn-close-create-modal" class="icon-btn" aria-label="關閉視窗">
        <svg
          viewBox="0 0 24 24"
          width="24"
          height="24"
          stroke="currentColor"
          stroke-width="2"
          fill="none"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="form-custom-routine">
        <div class="form-group">
          <label for="custom-routine-name">流程名稱</label>
          <input
            type="text"
            id="custom-routine-name"
            required
            placeholder="例如：早晨脊椎伸展"
            class="input-text-field"
          />
        </div>

        <div class="form-group">
          <label for="custom-routine-desc">流程描述</label>
          <textarea
            id="custom-routine-desc"
            placeholder="例如：針對起床後的脊椎進行溫和延展，喚醒身體活力。"
            class="input-textarea-field"
            rows="2"
          ></textarea>
        </div>

        <div class="form-group">
          <label>主題顏色</label>
          <div class="theme-color-selector">
            <label class="theme-color-option" title="鼠尾草綠 (預設)">
              <input type="radio" name="routine-theme" value="sage" checked />
              <span class="color-circle bg-sage"></span>
            </label>
            <label class="theme-color-option" title="陶土橘">
              <input type="radio" name="routine-theme" value="clay" />
              <span class="color-circle bg-clay"></span>
            </label>
            <label class="theme-color-option" title="薰衣草紫">
              <input type="radio" name="routine-theme" value="lavender" />
              <span class="color-circle bg-lavender"></span>
            </label>
            <label class="theme-color-option" title="玫瑰粉">
              <input type="radio" name="routine-theme" value="rose" />
              <span class="color-circle bg-rose"></span>
            </label>
            <label class="theme-color-option" title="暖沙黃">
              <input type="radio" name="routine-theme" value="gold" />
              <span class="color-circle bg-gold"></span>
            </label>
            <label class="theme-color-option" title="北歐藍">
              <input type="radio" name="routine-theme" value="ocean" />
              <span class="color-circle bg-ocean"></span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label for="custom-routine-rest-time">組間休息時間</label>
          <div class="input-unit-wrapper" style="width: 120px">
            <input
              type="number"
              id="custom-routine-rest-time"
              class="input-text-field"
              required
              min="1"
              max="60"
              value="5"
            />
            <span class="input-unit-label">秒</span>
          </div>
        </div>

        <div class="stretches-builder-area">
          <h4>動作排序步驟</h4>
          <div id="builder-stretches-list">
            <!-- Exercises will be appended here -->
          </div>
          <button type="button" id="btn-add-builder-stretch" class="btn btn-dashed">
            <svg
              viewBox="0 0 24 24"
              width="18"
              height="18"
              stroke="currentColor"
              stroke-width="2"
              fill="none"
            >
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            新增動作步驟
          </button>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button" id="btn-cancel-create" class="btn btn-secondary">取消</button>
      <button type="submit" form="form-custom-routine" class="btn btn-primary">
        儲存流程
      </button>
    </div>
  </div>
</div>
