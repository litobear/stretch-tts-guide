<section id="screen-home" class="app-screen active">
  <div class="routines-container">
    <div class="routines-header">
      <h3>選擇伸展流程</h3>
      <label
        class="checkbox-container flex-row"
        style="
          display: inline-flex;
          align-items: center;
          gap: 0.5rem;
          font-size: 0.95rem;
          color: var(--text-secondary);
          cursor: pointer;
        "
      >
        <input
          type="checkbox"
          id="toggle-hide-presets"
          style="
            accent-color: var(--accent-primary);
            cursor: pointer;
            width: 16px;
            height: 16px;
          "
        />
        隱藏內建流程
      </label>
    </div>
    <div id="routines-list" class="routines-grid">
      <!-- Dynamically populated via JS -->
      <div class="loading-placeholder">正在載入流程...</div>
    </div>
  </div>

  <!-- Custom Routine Options (Phase 1 Sharing) -->
  <div class="custom-actions-section">
    <h3>自訂伸展流程</h3>
    <div class="custom-buttons">
      <button id="btn-create-routine" class="btn btn-secondary">
        <svg
          viewBox="0 0 24 24"
          width="18"
          height="18"
          stroke="currentColor"
          stroke-width="2"
          fill="none"
        >
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        建立新流程
      </button>
      <button id="btn-create-routine-ai" class="btn btn-secondary">
        <svg
          viewBox="0 0 24 24"
          width="18"
          height="18"
          stroke="currentColor"
          stroke-width="2"
          fill="none"
        >
          <path d="m9.9 5.5.9-2.5 1 2.5 2.5 1-2.5 1-1 2.5-.9-2.5-2.5-1 2.5-1Z" />
          <path d="m19 14.3.5-1.5.6 1.5 1.5.5-1.5.6-.6 1.5-.5-1.5-1.5-.6 1.5-.5Z" />
          <path d="m5 16.5.6-1.5.6 1.5 1.5.5-1.5.6-.6 1.5-.6-1.5-1.5-.6 1.5-.5Z" />
        </svg>
        透過 AI 建立流程
      </button>
      <button id="btn-import-routine" class="btn btn-secondary">
        <svg
          viewBox="0 0 24 24"
          width="18"
          height="18"
          stroke="currentColor"
          stroke-width="2"
          fill="none"
        >
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        匯入分享連結/JSON
      </button>
    </div>
  </div>
</section>
