<section id="screen-workout" class="app-screen">
  <div class="workout-header">
    <div class="workout-title-area">
      <h2 id="workout-routine-name">流程名稱</h2>
      <span id="workout-step-indicator">第 0 / 0 步</span>
    </div>
    <button id="btn-stop-workout" class="btn btn-danger-text">結束離開</button>
  </div>

  <div class="workout-layout">
    <!-- Left/Top Side: Focused Timer Card -->
    <div class="visual-panel card timer-card-focused">
      <div class="circular-timer">
        <svg viewBox="0 0 100 100" class="timer-ring">
          <circle class="ring-bg" cx="50" cy="50" r="45"></circle>
          <circle id="timer-progress-bar" class="ring-fg" cx="50" cy="50" r="45"></circle>
        </svg>
        <div class="timer-labels">
          <span id="timer-state-label" class="timer-phase">準備</span>
          <span id="timer-countdown" class="timer-number">5</span>
          <span class="timer-sec-label">秒</span>
        </div>
      </div>

      <!-- Set indicator (circular, positioned top right) -->
      <div id="timer-set-indicator" class="set-indicator-circle" style="display: none">
        <span id="timer-set-current">1</span><span class="set-indicator-slash">/</span
        ><span id="timer-set-total">3</span>
      </div>

      <!-- Soft Audio Waveform (TTS active indicator) -->
      <div id="tts-audio-indicator" class="audio-waveform-hidden">
        <span class="bar bar-1"></span>
        <span class="bar bar-2"></span>
        <span class="bar bar-3"></span>
        <span class="bar bar-4"></span>
        <span class="bar bar-5"></span>
      </div>
    </div>

    <!-- Right/Bottom Side: Info and Controls -->
    <div class="info-panel">
      <div class="stretch-info-card card">
        <h3 id="current-stretch-name">準備中</h3>
        <div id="current-stretch-instructions" class="instructions-content">
          <p>請先調整裝置音量，並確認可正常聽到 TTS 語音測試。</p>
        </div>
      </div>

      <!-- Controls -->
      <div class="workout-controls card">
        <button id="btn-prev" class="btn-circle" aria-label="上一步">
          <svg
            viewBox="0 0 24 24"
            width="24"
            height="24"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
          >
            <polygon points="19 20 9 12 19 4 19 20"></polygon>
            <line x1="5" y1="19" x2="5" y2="5"></line>
          </svg>
        </button>

        <button id="btn-play-pause" class="btn-play-pause" aria-label="暫停/播放">
          <!-- Pause Icon (Default) -->
          <svg
            class="pause-icon"
            viewBox="0 0 24 24"
            width="28"
            height="28"
            fill="currentColor"
          >
            <rect x="6" y="4" width="4" height="16"></rect>
            <rect x="14" y="4" width="4" height="16"></rect>
          </svg>
          <!-- Play Icon (Hidden) -->
          <svg
            class="play-icon"
            viewBox="0 0 24 24"
            width="28"
            height="28"
            fill="currentColor"
            style="display: none"
          >
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
        </button>

        <button id="btn-next" class="btn-circle" aria-label="下一步">
          <svg
            viewBox="0 0 24 24"
            width="24"
            height="24"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
          >
            <polygon points="5 4 15 12 5 20 5 4"></polygon>
            <line x1="19" y1="5" x2="19" y2="19"></line>
          </svg>
        </button>
      </div>
    </div>
  </div>
</section>
