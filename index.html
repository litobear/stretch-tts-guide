<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZenStretch</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#8f9f95" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* 在樣式表載入前，預先將 body 渲染為深色，防範白屏閃爍 */
      body {
        background-color: #121514;
      }
    </style>

    <!-- 預先連結 CSS，避免 JS 非同步載入造成的樣式閃爍 (FOUC) -->
    <link rel="stylesheet" href="/src/styles/themes.css" />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body class="theme-dark">
    <div class="app-container">
      <load src="src/partials/header.html" />

      <main class="app-main">
        <load src="src/partials/screens/home.html" />
        <load src="src/partials/screens/workout.html" />
        <load src="src/partials/screens/summary.html" />
        <load src="src/partials/screens/history.html" />
      </main>

      <!-- Modals and Popups -->
      <load src="src/partials/modals/settings-drawer.html" />
      <load src="src/partials/modals/ai-import.html" />
      <load src="src/partials/modals/create-routine.html" />
      <load src="src/partials/modals/import-routine.html" />
      <load src="src/partials/modals/share-routine.html" />
      <load src="src/partials/modals/confirm.html" />
      <load src="src/partials/modals/preview-routine.html" />
      <load src="src/partials/modals/login-prompt.html" />
    </div>

    <!-- App Main Bundle -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
